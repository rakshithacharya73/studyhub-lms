<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      const path = window.location.pathname.replace(/\/+$/, '');
      const repo = '/studyhub-lms';
      const redirectPath = `${repo}/?redirect=${encodeURIComponent(path)}`;
      window.location.replace(redirectPath);
    </script>
  </head>
  <body></body>
</html>
